<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MonsoonGuard - AI-powered monsoon preparedness assistant. Get personalized safety plans, real-time weather alerts, emergency checklists, and multilingual guidance for monsoon season.">
  <meta name="keywords" content="monsoon preparedness, flood alerts, weather safety, emergency checklist, AI assistant">
  <title>MonsoonGuard - AI Monsoon Preparedness Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="stylesheet" href="./src/style.css">
</head>
<body>
  <!-- Skip to content link for accessibility -->
  <a href="#main-content" class="skip-link">Skip to main content</a>
  
  <!-- Header -->
  <header class="app-header" role="banner">
    <div class="header-container">
      <div class="logo-section">
        <svg class="logo-icon" width="36" height="36" viewBox="0 0 36 36" aria-hidden="true">
          <circle cx="18" cy="18" r="16" fill="none" stroke="url(#logoGrad)" stroke-width="2"/>
          <path d="M18 8 C18 8 12 16 12 21 C12 24.3 14.7 27 18 27 C21.3 27 24 24.3 24 21 C24 16 18 8 18 8Z" fill="url(#logoGrad)"/>
          <defs><linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2DD4BF"/><stop offset="100%" stop-color="#06B6D4"/></linearGradient></defs>
        </svg>
        <h1 class="app-title">MonsoonGuard</h1>
      </div>
      <nav class="main-nav" aria-label="Main navigation">
        <button class="nav-btn active" data-view="dashboard" aria-label="Dashboard view" id="nav-dashboard">
          <svg width="20" height="20" viewBox="0 0 20 20" aria-hidden="true"><path d="M3 10L10 3L17 10V17H12V13H8V17H3V10Z" fill="currentColor"/></svg>
          <span>Dashboard</span>
        </button>
        <button class="nav-btn" data-view="checklist" aria-label="Emergency checklist" id="nav-checklist">
          <svg width="20" height="20" viewBox="0 0 20 20" aria-hidden="true"><path d="M4 4H16V16H4V4ZM6 8H9L7 10.5L9 13H6L4 10.5L6 8ZM11 9H15V10H11V9ZM11 12H15V13H11V12Z" fill="currentColor"/></svg>
          <span>Checklist</span>
        </button>
        <button class="nav-btn" data-view="budget" aria-label="Budget planner" id="nav-budget">
          <svg width="20" height="20" viewBox="0 0 20 20" aria-hidden="true"><path d="M10 2C5.58 2 2 5.58 2 10C2 14.42 5.58 18 10 18C14.42 18 10 18 10 18V2Z" fill="currentColor" opacity="0.3"/><circle cx="10" cy="10" r="8" fill="none" stroke="currentColor" stroke-width="1.5"/><text x="10" y="13" text-anchor="middle" font-size="8" fill="currentColor">₹</text></svg>
          <span>Budget</span>
        </button>
        <button class="nav-btn" data-view="advisor" aria-label="AI monsoon advisor" id="nav-advisor">
          <svg width="20" height="20" viewBox="0 0 20 20" aria-hidden="true"><path d="M10 2C5.58 2 2 5.58 2 10C2 14.42 5.58 18 10 18C14.42 18 18 14.42 18 10C18 5.58 14.42 2 10 2ZM9 14L5 10L6.41 8.59L9 11.17L13.59 6.58L15 8L9 14Z" fill="currentColor"/></svg>
          <span>AI Advisor</span>
        </button>
      </nav>
      <div class="header-actions">
        <div class="language-selector">
          <label for="language-select" class="visually-hidden">Select language</label>
          <select id="language-select" aria-label="Select language">
            <option value="en">English</option>
            <option value="hi">हिन्दी</option>
            <option value="bn">বাংলা</option>
            <option value="ta">தமிழ்</option>
            <option value="te">తెలుగు</option>
            <option value="mr">मराठी</option>
          </select>
        </div>
        <button class="settings-btn" aria-label="Settings" id="settings-btn">
          <svg width="20" height="20" viewBox="0 0 20 20" aria-hidden="true"><path d="M10 13C11.66 13 13 11.66 13 10C13 8.34 11.66 7 10 7C8.34 7 7 8.34 7 10C7 11.66 8.34 13 10 13ZM17.32 8.93L15.45 7.46C15.49 7.16 15.5 6.84 15.45 6.54L17.32 5.07C17.5 4.92 17.55 4.67 17.43 4.46L15.63 1.34C15.51 1.14 15.27 1.05 15.05 1.14L12.85 2.02C12.36 1.66 11.82 1.38 11.24 1.18L10.92 0.84C10.88 0.36 10.49 0 10.01 0H6.41C5.93 0 5.54 0.36 5.5 0.84L5.18 1.18C4.6 1.38 4.06 1.66 3.57 2.02L1.37 1.14C1.15 1.05 0.91 1.14 0.79 1.34L-1.01 4.46" fill="currentColor"/></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Rain animation canvas -->
  <canvas id="rain-canvas" aria-hidden="true"></canvas>

  <!-- Main content -->
  <main id="main-content" role="main">
    <!-- Views will be rendered here by JavaScript -->
    <div id="app-view" class="app-view"></div>
  </main>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settings-modal" role="dialog" aria-modal="true" aria-labelledby="settings-title" hidden>
    <div class="modal-content glass-panel">
      <div class="modal-header">
        <h2 id="settings-title">Settings</h2>
        <button class="modal-close" aria-label="Close settings" id="close-settings-btn">&times;</button>
      </div>
      <div class="modal-body">
        <div class="setting-group">
          <label for="gemini-api-key">Gemini API Key</label>
          <p class="setting-hint" id="api-key-hint">Enter your free Gemini API key for AI-powered features. Get one at <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener noreferrer">Google AI Studio</a>.</p>
          <input type="password" id="gemini-api-key" aria-describedby="api-key-hint" placeholder="Enter your Gemini API key" autocomplete="off">
          <button class="btn btn-primary" id="save-api-key" aria-label="Save API key">Save Key</button>
        </div>
        <div class="setting-group">
          <label for="location-input">Your Location</label>
          <p class="setting-hint" id="location-hint">Enter your city name or use GPS for accurate weather data.</p>
          <div class="input-group">
            <input type="text" id="location-input" aria-describedby="location-hint" placeholder="e.g., Mumbai, Kolkata, Chennai">
            <button class="btn btn-secondary" id="use-gps-btn" aria-label="Use GPS location">📍 GPS</button>
          </div>
        </div>
        <div class="setting-group">
          <label for="family-size">Family Size</label>
          <input type="number" id="family-size" min="1" max="20" value="4" aria-label="Number of family members">
        </div>
        <div class="setting-group">
          <fieldset>
            <legend>Household Vulnerabilities</legend>
            <div class="checkbox-group">
              <input type="checkbox" id="vuln-elderly" name="vulnerabilities" value="elderly">
              <label for="vuln-elderly">Elderly members (60+)</label>
            </div>
            <div class="checkbox-group">
              <input type="checkbox" id="vuln-children" name="vulnerabilities" value="children">
              <label for="vuln-children">Young children (0-5)</label>
            </div>
            <div class="checkbox-group">
              <input type="checkbox" id="vuln-disabled" name="vulnerabilities" value="disabled">
              <label for="vuln-disabled">Persons with disabilities</label>
            </div>
            <div class="checkbox-group">
              <input type="checkbox" id="vuln-pets" name="vulnerabilities" value="pets">
              <label for="vuln-pets">Pets / Livestock</label>
            </div>
            <div class="checkbox-group">
              <input type="checkbox" id="vuln-medical" name="vulnerabilities" value="medical">
              <label for="vuln-medical">Members with medical conditions</label>
            </div>
          </fieldset>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast notification area -->
  <div id="toast-container" class="toast-container" aria-live="polite" role="status"></div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
